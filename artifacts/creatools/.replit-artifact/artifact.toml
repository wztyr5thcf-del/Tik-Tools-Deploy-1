kind = "web"
previewPath = "/"
title = "Creatools"
version = "1.0.0"
id = "artifacts/creatools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18853

[services.development]
run = "pnpm --filter @workspace/creatools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creatools", "run", "build" ]
publicDir = "artifacts/creatools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18853"
BASE_PATH = "/"
