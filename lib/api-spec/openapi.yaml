openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Creatools - TikTok LIVE monitoring API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tiktok
    description: TikTok LIVE operations
  - name: config
    description: Configuration operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tiktok/top-channels:
    get:
      operationId: getTopChannels
      tags: [tiktok]
      summary: Get top live channels
      description: Returns currently live TikTok channels (no API key required). displayName mapped to nickname.
      responses:
        "200":
          description: List of live channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LiveChannel"

  /tiktok/live-status:
    get:
      operationId: getLiveStatus
      tags: [tiktok]
      summary: Check if user is live
      description: Calls tik.tools /webcast/live_status with unique_id (snake_case) param.
      parameters:
        - name: uniqueId
          in: query
          required: true
          schema:
            type: string
          description: TikTok username (without @)
      responses:
        "200":
          description: Live status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStatus"

  /tiktok/jwt:
    post:
      operationId: mintJwt
      tags: [tiktok]
      summary: Mint JWT for WebSocket
      description: Mints a short-lived JWT for wss://api.tik.tools WebSocket connections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JwtRequest"
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwtResponse"

  /tiktok/room-info:
    post:
      operationId: getRoomInfo
      tags: [tiktok]
      summary: Get room information
      description: If only uniqueId is provided, backend resolves room_id via live_status first, then calls room_info with room_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInfoRequest"
      responses:
        "200":
          description: Room info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomInfo"

  /tiktok/bulk-check:
    post:
      operationId: bulkLiveCheck
      tags: [tiktok]
      summary: Check multiple users live status
      description: Uses tik.tools bulk endpoint (Basic+ tier). On Sandbox, falls back to parallel individual live_status calls automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCheckRequest"
      responses:
        "200":
          description: Bulk live check results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BulkCheckResult"

  /tiktok/rate-limits:
    get:
      operationId: getRateLimits
      tags: [tiktok]
      summary: Get API rate limits
      responses:
        "200":
          description: Rate limit info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimits"

  /tiktok/gift-catalog:
    get:
      operationId: getGiftCatalog
      tags: [tiktok]
      summary: Get gift catalog
      description: Returns the list of known TikTok gifts with diamond costs and icons. Available on all tiers.
      responses:
        "200":
          description: Gift catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftItem"

  /tiktok/user-profile:
    get:
      operationId: getUserProfile
      tags: [tiktok]
      summary: Get user profile
      description: Returns TikTok user profile data. Requires Pro tier or above.
      parameters:
        - name: uniqueId
          in: query
          required: true
          schema:
            type: string
          description: TikTok username (without @)
      responses:
        "200":
          description: User profile or tier error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get configuration
      description: Returns current app configuration (API key is masked)
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"
    post:
      operationId: saveConfig
      tags: [config]
      summary: Save configuration
      description: Save the tik.tools API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigInput"
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LiveChannel:
      type: object
      description: A currently live TikTok channel.
      properties:
        uniqueId:
          type: string
        nickname:
          type: ["string", "null"]
          description: Display name (mapped from tik.tools displayName field)
        profilePictureUrl:
          type: ["string", "null"]
        roomId:
          type: ["string", "null"]
        viewerCount:
          type: ["integer", "null"]
        title:
          type: ["string", "null"]
        region:
          type: ["string", "null"]
          description: Two-letter region code (e.g. TW, CA, US)
      required: [uniqueId]

    LiveStatus:
      type: object
      properties:
        uniqueId:
          type: string
        isLive:
          type: boolean
        roomId:
          type: ["string", "null"]
        cached:
          type: boolean
      required: [uniqueId, isLive, cached]

    JwtRequest:
      type: object
      properties:
        uniqueId:
          type: string
        expireAfter:
          type: integer
          description: Seconds until JWT expires (default 600)
      required: [uniqueId]

    JwtResponse:
      type: object
      properties:
        token:
          type: string
        uniqueId:
          type: string
      required: [token, uniqueId]

    RoomInfoRequest:
      type: object
      properties:
        uniqueId:
          type: ["string", "null"]
        roomId:
          type: ["string", "null"]

    RoomInfo:
      type: object
      properties:
        roomId:
          type: ["string", "null"]
        alive:
          type: boolean
        title:
          type: ["string", "null"]
        viewerCount:
          type: ["integer", "null"]
        likeCount:
          type: ["integer", "null"]
        owner:
          $ref: "#/components/schemas/RoomOwner"
      required: [alive]

    RoomOwner:
      type: object
      properties:
        uniqueId:
          type: ["string", "null"]
        nickname:
          type: ["string", "null"]
        profilePictureUrl:
          type: ["string", "null"]

    BulkCheckRequest:
      type: object
      properties:
        uniqueIds:
          type: array
          items:
            type: string
      required: [uniqueIds]

    BulkCheckResult:
      type: object
      properties:
        uniqueId:
          type: string
        isLive:
          type: boolean
        roomId:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
          description: Available on Basic+ tier only
        viewerCount:
          type: ["integer", "null"]
          description: Available on Basic+ tier only
      required: [uniqueId, isLive]

    RateLimits:
      type: object
      properties:
        tier:
          type: string
        apiLimit:
          type: integer
        apiRemaining:
          type: integer
        apiResetAt:
          type: ["integer", "null"]
        wsLimit:
          type: integer
        wsCurrent:
          type: integer
        bulkCheckLimit:
          type: ["integer", "null"]
      required: [tier, apiLimit, apiRemaining, wsLimit, wsCurrent]

    GiftItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        iconUrl:
          type: string
        diamondCount:
          type: integer
        valueUsd:
          type: number
      required: [id, name, iconUrl, diamondCount, valueUsd]

    UserProfile:
      type: object
      properties:
        uniqueId:
          type: string
        nickname:
          type: ["string", "null"]
        profilePictureUrl:
          type: ["string", "null"]
        followerCount:
          type: ["integer", "null"]
        followingCount:
          type: ["integer", "null"]
        videoCount:
          type: ["integer", "null"]
        likeCount:
          type: ["integer", "null"]
        bio:
          type: ["string", "null"]
        available:
          type: boolean
          description: False when the endpoint requires a higher tier
        requiredTier:
          type: ["string", "null"]
      required: [uniqueId, available]

    AppConfig:
      type: object
      properties:
        apiKeySet:
          type: boolean
        apiKeyMasked:
          type: ["string", "null"]
        tier:
          type: ["string", "null"]
      required: [apiKeySet]

    ConfigInput:
      type: object
      properties:
        apiKey:
          type: string
      required: [apiKey]
